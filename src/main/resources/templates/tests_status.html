{#include base.html}
{#title}Execution Status - TestState{/title}
 
{#body}
<section class="flex-between mb-3">
    <div>
        <h2>Status</h2>
        <p class="muted">{session.sessionId}</p>
    </div>
    <div class="flex">
        <a href="/tests/{session.sessionId}/report/json" class="btn small">Export</a>
        <a href="/tests/{session.sessionId}/report/json?full=true" class="btn small">JSON</a>
        <a href="/tests" class="btn small">Return</a>
    </div>
</section>
 
<section>
    <div class="flex-between mb-1">
        <h3>Progress</h3>
        <span id="status-badge" class="status">PENDING</span>
    </div>
    <div id="status-message" class="muted small mb-2">
        Awaiting agent...
    </div>
    <div id="steps-container"></div>
</section>
 
<section id="summary-section" class="d-none">
    <h3>Summary</h3>
    <article>
        <p class="small mb-1">Duration: <strong id="summary-duration"></strong></p>
        <pre id="summary-json" class="metadata-pre"></pre>
    </article>
</section>
 
<section id="attachments-section" class="d-none">
    <h3>Assets</h3>
    <div id="attachments-container" class="asset-grid"></div>
</section>
 
<section>
    <h3>Logs</h3>
    <div class="console" id="telemetry-console"></div>
</section>
 
<template id="attachment-template">
    <article>
        <div class="attachment-name small truncate mb-2" style="font-weight: 600;"></div>
        <img class="attachment-img asset-img d-none mb-2">
        <a class="download-link btn small w-full">Download</a>
    </article>
</template>
 
<template id="step-template">
    <article class="mb-1">
        <div class="flex-between cursor-pointer step-header">
            <div class="flex">
                <span class="status mr-1"></span>
                <strong class="step-name small"></strong>
            </div>
            <code class="duration muted small"></code>
        </div>
        <div class="details step-details d-none">
            <p class="muted small status-message mb-2"></p>
            <pre class="metadata-pre step-metadata d-none"></pre>
            <div class="attachments asset-grid asset-grid-small"></div>
        </div>
    </article>
</template>
 
<template id="nested-steps-template">
    <div class="nested-steps"></div>
</template>
 
<script>
    window.sessionId = "{session.sessionId}";
</script>
<script src="/js/tests_status.js"></script>
{/body}
{/include}
