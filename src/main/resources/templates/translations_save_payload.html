{#include base.html}
{#title}Save Payload - TestState{/title}
 
{#body}
<section class="clearfix">
    <div class="title-area">
        <h2>Save Translated Payload</h2>
    </div>
    <div class="action-area">
        <a href="/translations/{sessionId}/status" class="btn">Cancel</a>
    </div>
</section>
 
<form action="/translations/save-payload" method="POST" class="full-width-form">
    <input type="hidden" name="sessionId" value="{sessionId}">
    <input type="hidden" name="index" value="{index}">
 
    <fieldset>
        <legend>Repository Entity</legend>
        <div class="field">
            <label>Entity Name</label>
            <input type="text" name="name" value="{defaultName}" required autofocus>
        </div>
        <div class="field">
            <label>Description</label>
            <textarea name="description" rows="3">Translated {type} from session {sessionId}</textarea>
        </div>
    </fieldset>
 
    <fieldset>
        <legend>Metadata</legend>
        <div class="field">
            <label>Payload Type</label>
            <input type="text" value="{type}" readonly class="input-readonly">
        </div>
    </fieldset>
 
    <button type="submit" class="btn btn-primary">Save to Database</button>
</form>
{/body}
{/include}
